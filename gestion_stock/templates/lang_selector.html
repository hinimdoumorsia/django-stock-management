{% load i18n %}
<form action="{% url 'set_language' %}" method="post" style="display: inline;">
    {% csrf_token %}
    <input name="next" type="hidden" value="{{ request.get_full_path }}">
    <select name="language" onchange="this.form.submit()" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer;">
        <option value="fr" {% if LANGUAGE_CODE == 'fr' %}selected{% endif %}>🇫🇷 Français</option>
        <option value="en" {% if LANGUAGE_CODE == 'en' %}selected{% endif %}>🇬🇧 English</option>
        <option value="ar" {% if LANGUAGE_CODE == 'ar' %}selected{% endif %}>🇲🇦 العربية</option>
        <option value="zgh" {% if LANGUAGE_CODE == 'zgh' %}selected{% endif %}>ⵣ Tamazight</option>
        <option value="zh-hans" {% if LANGUAGE_CODE == 'zh-hans' %}selected{% endif %}>🇨🇳 中文</option>
    </select>
</form>
