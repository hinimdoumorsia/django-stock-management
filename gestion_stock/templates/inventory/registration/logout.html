{% extends 'inventory/base.html' %}
{% load i18n %}

{% block title %}{% trans "Déconnexion" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-info text-white text-center">
                <h3><i class="fas fa-sign-out-alt"></i> {% trans "Déconnexion" %}</h3>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">{% trans "Vous avez été déconnecté avec succès." %}</p>
                <a href="{% url 'login' %}" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> {% trans "Se reconnecter" %}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
